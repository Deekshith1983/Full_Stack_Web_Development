<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container-flu">
    <div id="vanta-bg"></div>
  </div>

  <div class="container-fluid text-center mt-3">
    <h1 id="employee-form-title">Employee Form</h1>
  </div>

  <div class="container-fluid justify-content-centre col-lg-6 col-md-12">
    <form id="employee-form" class="row g-3" action="" method="post">
      <div class="col-md-12">
        <label id="employee-id-label" for="Employee_id" class="form-label">Employee ID</label>
        <input type="text" class="form-control" id="Employee_id" name="Employee_id" placeholder="Employee ID.">
      </div>
      <div class="col-md-6">
        <label id="name-label" for="firstname" class="form-label">First Name</label>
        <input type="text" class="form-control" id="firstname" name="firstname" placeholder="John">
      </div>
      <div class="col-md-6">
        <label id="lastname-label" for="lastname" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="lastname" name="lastname" placeholder="Doe">
      </div>
      <div class="col-md-12">
        <label id="email-label" for="inputEmail4" class="form-label">Email</label>
        <input type="email" class="form-control" id="inputEmail4" placeholder="jhondoe@email.com">
      </div>
      <div class="col-12">
        <label id="address-label" for="inputAddress" class="form-label">Address</label>
        <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
      </div>
      <div class="col-md-6">
        <label id="address2-label" for="inputNumber" class="form-label">Mobile Number</label>
        <input type="number" class="form-control" id="inputNumber" placeholder="1234567890">
      </div>
      <div class="col-md-6">
        <label id="address2-label" for="inputteleNumber" class="form-label">Telephone Number</label>
        <input type="tel" class="form-control" id="inputteleNumber" placeholder="080-4567890">
      </div>
      <div class="col-md-6">
        <label id="city-label" for="inputCity" class="form-label">City</label>
        <input type="text" class="form-control" id="inputCity" placeholder="Banglore">
      </div>
      <div class="col-md-4">
        <label id="state-label" for="inputState" class="form-label">State</label>
        <input type="text" class="form-control" id="inputState" placeholder="Karnataka">
      </div>
      <div class="col-md-2">
        <label id="zip-label" for="inputZip" class="form-label">Zip</label>
        <input type="text" class="form-control" id="inputZip" placeholder="230098">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Submit</button>
        <p id="demo"></p>
      </div>
    </form>

  </div>
  </div>
</body>
<script src="script.js"></script>

</html>
