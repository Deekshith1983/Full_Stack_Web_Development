<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>Profile Preview</title>
        <style>
            body {
                font-family: Arial;
                padding: 30px;
            }

            .name-container {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background: #0066cc;
                color: white;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                font-size: 14px;
                font-weight: bold;
            }

            #name {
                margin: 0;
            }
        </style>
    </head>

<body>

    <div class="name-container">
        <h2 id="name"></h2>
        <span id="badge"></span>
    </div>
    <p id="role"></p>

    <h4>Skills</h4>
    <ul id="skills"></ul>

    <h4>GitHub</h4>
    <a id="github" target="_blank"></a>

    <script>
        const savedUser = JSON.parse(sessionStorage.getItem("savedUser"));
        let user = savedUser;

        // ✅ FETCH LATEST DATA FROM DATABASE
        if (user && user.githubUser) {
            fetch(`/get-user/${encodeURIComponent(user.githubUser)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        user = data.user;
                        console.log("Loaded user from DB:", user);
                        renderUser();
                    }
                })
                .catch(err => console.error("Error fetching user:", err));
        }

        function renderUser() {
            if (user) {
                document.getElementById("name").innerText = user.name;

                if (user.githubVerified) {
                    document.getElementById("badge").innerHTML = '<span class="badge">✔️</span>';
                } else {
                    document.getElementById("badge").innerHTML = '';
                }

                document.getElementById("role").innerText = user.role;

                const ul = document.getElementById("skills");
                ul.innerHTML = '';
                user.skills.forEach(s => {
                    const li = document.createElement("li");
                    li.innerText = s;
                    ul.appendChild(li);
                });

                const link = document.getElementById("github");
                link.href = user.githubUser;
                link.innerText = "View Profile";
            }
        }

        // Initial render with sessionStorage data
        renderUser();
    </script>

</body>

</html>
